<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Lily the Seed Hunter</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>Lily the Seed Hunter</h1>


<section class="cover">

    <img 
        src="images/cover.webp"
        alt="Story cover"
    >


    <div class="cover-text">

        <h2>
            The Search for the SEED
        </h2>


        <p>
            A strange journey begins when Lili,
            an artificial lifeform created by her Creator,
            is thrown into a mysterious universe of portals,
            secrets and unknown worlds.
        </p>


        <p>
            Follow her mission to discover the truth
            behind the SEED.
        </p>


    </div>


    <button
        class="start-button"
        onclick="document.getElementById('story').scrollIntoView({behavior:'smooth'})"
    >
        START READING
    </button>


</section>



<main id="story"></main>
  
<div class="floating-nav">

    <button id="jumpButton">
        1X
    </button>

    <button id="topButton">
        ↑
    </button>

    <button id="nextButton">
        ↓
    </button>

</div>


<script src="script.js"></script>

</body>

</html>
